<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qual é a boa? - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 text-white body-bg">
    
    <div class="container d-flex justify-content-start align-items-center flex-wrap">
        <!-- Texto -->
        <div class="mb-4 texto-principal">
        <h1 class="fw-bold" style="max-width: 400px; line-height: 2.00; margin-left: 130px;">
            <span class="text-warning">Qual é a boa?</span><br>
        </h1>
        <h2 class="texto-secundario" style="margin-left: 130px;">Descubra bares,<br>restaurantes e <br> eventos perto de<br>você.</h2>
        </div>

        <!-- Card Cadastro -->
        <div class="bg-white text-dark p-4 rounded-4 shadow card-cadastro" style="width: 360px;">
            <h2 class="text-center mb-3 fw-bold">Cadastre-se</h2>
            
            <!-- Botões sociais -->
            <div class="d-flex justify-content-center gap-3 mb-4">
                <img src="google.png" width="50" opacity="10%" class="cursor-pointer">
                <img src="facebook.png" width="50" class="cursor-pointer">
            </div>

            <!-- Formulário -->
            <form>
                <input type="text" class="form-control mb-3 rounded-pill" placeholder="Nome Completo">
                <input type="email" class="form-control mb-3 rounded-pill" placeholder="Email">
                <input type="password" class="form-control mb-3 rounded-pill" placeholder="Insira sua senha">
                <input type="password" class="form-control mb-2 rounded-pill" placeholder="Confirmar senha">
                <p class="text-danger small mb-2">As senhas devem ser iguais</p>
                <button type="submit" class="btn btn-dark w-100 rounded-pill fw-bold">Entrar</button>
            </form>

            <p class="text-center mt-3">Já tem uma conta? <a href="login.html" class="text-warning fw-bold text-decoration-none">Entrar</a></p>
        </div>
    </div>

</body>
</html>
